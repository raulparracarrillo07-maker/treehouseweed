<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TreeHouseWeed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=7" />
</head>
<body>
  <div id="puerta-edad" class="puerta">
    <div class="puerta-caja">
      <h1>Tree<span class="oro">House</span>Weed</h1>
      <p>Para entrar necesitas ser mayor de <strong data-edad-min>18</strong> años.</p>
      <p>¿Eres mayor de edad?</p>
      <div class="puerta-botones">
        <button data-si class="btn-oro">Sí, entrar</button>
        <button data-no class="btn-tenue">No</button>
      </div>
    </div>
  </div>
  <section id="intro" class="intro oculto">
    <div class="intro-sticky">
      <canvas id="intro-canvas"></canvas>
      <div class="intro-vignette"></div>
      <div class="intro-marca">
        <img class="intro-logo" src="assets/img/logo/treehouseweed-logo-transparente.png" alt="TreeHouseWeed" />
        <div class="intro-scroll">
          <span class="intro-chevron" aria-hidden="true"></span>
          <span class="intro-tag">Desliza para subir al árbol</span>
          <span class="intro-tap">Doble tap para entrar a la tienda</span>
        </div>
      </div>
      <div id="tienda-final" class="tienda-final" aria-hidden="true">
        <div class="tienda-final-box">
          <img class="tienda-final-img" src="assets/img/tienda-final.png" alt="Interior de la tienda TreeHouseWeed" />
          <canvas id="humo-canvas" class="humo-capa" aria-hidden="true"></canvas>
          <div id="marcos-capa" class="marcos-capa"></div>
        </div>
      </div>
    </div>
  </section>
  <main id="app" class="contenedor"></main>
  <footer class="aviso">Consume con responsabilidad. Producto solo para mayores de edad.</footer>
  <button id="fab-carrito" class="fab">Carrito <span id="badge-carrito">0</span></button>
  <a id="fab-whatsapp" class="fab fab-wa" target="_blank" rel="noopener">WhatsApp</a>
  <aside id="panel-carrito" class="panel oculto"></aside>
  <script src="assets/js/lib/lenis.min.js"></script>
  <script type="module" src="assets/js/main.js?v=7"></script>
</body>
</html>
