<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TreeHouseWeed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=12" />
</head>
<body>
  <div id="puerta-edad" class="puerta">
    <div class="puerta-motas" aria-hidden="true"></div>
    <div class="puerta-caja">
      <span class="puerta-badge"><strong data-edad-min>18</strong>+</span>
      <img class="puerta-logo" src="assets/img/logo/treehouseweed-logo-transparente.png" alt="TreeHouseWeed" />
      <p class="puerta-lema">Relaxation has never been this simple</p>
      <div class="puerta-linea"></div>
      <p class="puerta-pregunta">Para entrar, confirma que eres mayor de edad</p>
      <div class="puerta-botones">
        <button data-si class="btn-oro">Sí, soy mayor de <span data-edad-min>18</span></button>
        <button data-no class="btn-tenue">Salir</button>
      </div>
      <p class="puerta-aviso">Producto exclusivo para adultos. Consume con responsabilidad.</p>
    </div>
  </div>
  <section id="intro" class="intro oculto">
    <div class="intro-sticky">
      <canvas id="intro-canvas"></canvas>
      <div class="intro-vignette"></div>
      <div class="intro-marca">
        <img class="intro-logo" src="assets/img/logo/treehouseweed-logo-transparente.png" alt="TreeHouseWeed" />
        <div class="intro-scroll">
          <span class="intro-chevron" aria-hidden="true"></span>
          <span class="intro-tag">Desliza para subir al árbol</span>
          <span class="intro-tap">Doble tap para entrar a la tienda</span>
        </div>
      </div>
      <div id="tienda-final" class="tienda-final" aria-hidden="true">
        <div class="tienda-final-box">
          <img class="tienda-final-img" src="assets/img/tienda-final.png" alt="Interior de la tienda TreeHouseWeed" />
          <img class="mascota-viva" src="assets/img/mascota-viva.png" alt="" aria-hidden="true" />
          <canvas id="humo-canvas" class="humo-capa" aria-hidden="true"></canvas>
          <div id="marcos-capa" class="marcos-capa"></div>
        </div>
      </div>
    </div>
  </section>
  <main id="app" class="contenedor"></main>
  <footer class="aviso">Consume con responsabilidad. Producto solo para mayores de edad.</footer>
  <button id="fab-nosotros" class="fab-nosotros">Sobre nosotros</button>
  <button id="fab-carrito" class="fab">Carrito <span id="badge-carrito">0</span></button>
  <a id="fab-instagram" class="fab fab-ig" target="_blank" rel="noopener">Instagram</a>
  <aside id="panel-carrito" class="panel oculto"></aside>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Anfitrión: el monito te cuenta sobre la marca (zoom + habla + secciones) -->
  <div id="monito-modal" class="monito-modal oculto" role="dialog" aria-modal="true" aria-label="Conoce TreeHouseWeed con el anfitrión">
    <button class="monito-cerrar" aria-label="Cerrar">✕</button>
    <div class="monito-escena">
      <div class="monito-fig-wrap">
        <img class="monito-fig" src="assets/img/mascota-viva.png" alt="Anfitrión de TreeHouseWeed" />
      </div>
      <div class="monito-globo" aria-live="polite"></div>
    </div>
    <div class="monito-tabs" role="tablist">
      <button class="mt" data-sec="nosotros" role="tab">Nosotros</button>
      <button class="mt" data-sec="trabajo" role="tab">Cómo trabajamos</button>
      <button class="mt" data-sec="calidad" role="tab">Nuestra calidad</button>
      <button class="mt" data-sec="contacto" role="tab">Contacto</button>
    </div>
  </div>
  <script src="assets/js/lib/lenis.min.js"></script>
  <script type="module" src="assets/js/main.js?v=12"></script>
</body>
</html>
